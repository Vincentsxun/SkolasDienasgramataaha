<!DOCTYPE html>
<html>
<head>
    <title>PIESLĒGTIES</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bodyregistry">
    <img class="logoreg" src="/static/logo.png">
    <h2>PIESLĒGTIES</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                    <p class="flash-message flash-{{ category }}">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form class="regform" method="POST">
        <input class="reginput" type="text" name="username" placeholder="Vārds, uzvārds" required><br>
        <input class="reginput" type="password" name="password" placeholder="Parole" required><br>

        <button class="regbutton" type="submit">PIESLĒGTIES</button>
    </form>
    <a class="aregister" href="/register">IZVEIDOT KONTU</a>
</body>
</html>
